<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vortex Mega Offers</title>
    <style>
        body { margin:0; background:#0b111e; color:#fff; font-family:sans-serif; min-height:100vh; padding: 20px 0; display:flex; flex-direction:column; align-items:center; }
        .container { max-width:450px; width:90%; text-align:center; box-sizing: border-box; }
        
        /* Main Headings */
        h1 { color:#ffe500; margin:0 0 5px 0; font-family:monospace; font-size:26px; text-transform:uppercase; letter-spacing: 1px; }
        .subtitle { color:#cbd5e1; font-size:12px; margin-bottom:25px; font-family:monospace; }
        
        /* New Full-Block Deal Card */
        .deal-card { background:rgba(20,30,55,0.95); border-radius:16px; border:2px solid #2874f0; box-shadow:0 0 15px rgba(40,116,240,0.15); padding: 15px; margin-bottom: 25px; text-align: left; display: flex; flex-direction: column; box-sizing: border-box; }
        
        /* Product Image inside Card (Full Width) */
        .deal-p-img { width: 100%; height: auto; max-height: 250px; border-radius: 10px; object-fit: cover; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 12px; }
        
        /* Product Details Layout */
        .deal-info { margin-bottom: 15px; padding: 0 5px; }
        .deal-title { font-size: 16px; font-weight: bold; color: #fff; margin-bottom: 8px; line-height: 1.4; }
        .deal-price { font-size: 15px; color: #4ade80; font-weight: bold; }
        
        /* Order Button (Full Width Bottom) */
        .btn { display: block; width: 100%; padding: 12px 0; color: #fff; font-weight: bold; border-radius: 8px; text-decoration: none; font-size: 14px; text-align: center; text-transform: uppercase; transition: 0.2s; background: #2874f0; box-sizing: border-box; box-shadow: 0 4px 10px rgba(40,116,240,0.3); }
        .btn:hover { background: #1a62d6; }
        
        /* Admin Panel Styling */
        .admin-panel { display: none; background: #1e293b; border: 2px solid #ffe500; border-radius: 16px; padding: 20px; margin-bottom: 25px; text-align: left; box-sizing: border-box; width: 100%; }
        .admin-panel h3 { margin-top: 0; color: #ffe500; font-size: 18px; text-transform: uppercase; text-align: center; margin-bottom: 15px; }
        .admin-panel label { font-size: 12px; color: #94a3b8; display: block; margin-top: 10px; font-weight: bold; }
        .admin-panel input { width: 100%; padding: 10px; margin: 6px 0 12px 0; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: #fff; box-sizing: border-box; }
        .admin-panel input[type="file"] { background: #0f172a; border: 1px dashed #38bdf8; padding: 12px; cursor: pointer; color: #cbd5e1; }
        .admin-btn { background: #4ade80; color: #000; border: none; font-weight: bold; cursor: pointer; width: 100%; padding: 12px; border-radius: 8px; text-transform: uppercase; margin-top: 15px; font-size: 14px; }
        
        .footer-admin-btn { margin-top: 20px; background: none; border: none; color: #475569; font-size: 12px; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="container">
        
        <div id="adminPanel" class="admin-panel">
            <h3>🛠️ Add New Product Card</h3>
            
            <label>📸 Gallery Se Photo Select Karein:</label>
            <input type="file" id="pImgFile" accept="image/*">
            
            <label>📦 Product Name / Title:</label>
            <input type="text" id="pTitle" placeholder="e.g., Mnytra Footwear Under ₹899">
            
            <label>🔗 Product Offer Link (Flipkart/Amazon):</label>
            <input type="text" id="pLink" placeholder="Paste Deal Link">
            
            <label>💰 Rate / Price:</label>
            <input type="text" id="pPrice" placeholder="e.g., ₹149">
            
            <button class="admin-btn" onclick="addNewProduct()">Add Product Live</button>
        </div>

        <h1>VORTEX MEGA OFFERS</h1>
        <div class="subtitle">// LIVE VERIFIED APP REDIRECTS //</div>
        
        <div id="deals-container"></div>

        <button class="footer-admin-btn" onclick="toggleAdmin()">【 System Admin Login 】</button>
    </div>

    <script>
        // Default static deals with sample images
        const defaultDeals = [
            { title: "🛍️ Upto 87% OFF On Branded Kurtis (Festive Deal)", price: "Best Offer Price", link: "https://bitli.in/H68v972", img: "https://i.ibb.co/v6WbY8XQ/Screenshot-2026-06-26-11-03-23-87-92b64b2a7aa6eb3771ed6e18d0029815.jpg" }
        ];

        function renderDeals() {
            const container = document.getElementById('deals-container');
            let dynamicDeals = JSON.parse(localStorage.getItem('vortex_deals')) || [];
            
            // Dono lists ko jod rahe hain, dynamic wale upar aayenge
            let allDeals = [...dynamicDeals, ...defaultDeals];
            
            container.innerHTML = '';
            allDeals.forEach(deal => {
                // Agar photo nahi milti toh default banner laga dega
                const itemImg = deal.img || "https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?q=80&w=600";
                
                container.innerHTML += `
                    <div class="deal-card">
                        <img class="deal-p-img" src="${itemImg}" alt="product">
                        <div class="deal-info">
                            <div class="deal-title">${deal.title}</div>
                            <div class="deal-price">${deal.price}</div>
                        </div>
                        <a href="${deal.link}" target="_blank" class="btn">Order On FK</a>
                    </div>
                `;
            });
        }

        function toggleAdmin() {
            const panel = document.getElementById('adminPanel');
            if (panel.style.display === 'block') {
                panel.style.display = 'none';
            } else {
                let pass = prompt("Rajkumar Bhai, Enter Secret Code:");
                if (pass === "1234") {
                    panel.style.display = 'block';
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                } else {
                    alert("Wrong Password!");
                }
            }
        }

        function addNewProduct() {
            const title = document.getElementById('pTitle').value;
            const link = document.getElementById('pLink').value;
            const price = document.getElementById('pPrice').value;
            const fileInput = document.getElementById('pImgFile');

            if(!title || !link || !price) {
                alert("Bhai, sari details dalo!");
                return;
            }

            if (fileInput.files && fileInput.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    saveProduct(title, price, link, e.target.result);
                }
                reader.readAsDataURL(fileInput.files[0]);
            } else {
                // Agar photo select nahi ki toh bina photo ke ya default photo ke sath save hoga
                saveProduct(title, price, link, "");
            }
        }

        function saveProduct(title, price, link, imgData) {
            let dynamicDeals = JSON.parse(localStorage.getItem('vortex_deals')) || [];
            
            // Naya product list me sabse aage judega aur purane wale niche khisakte jayenge (mitenge nahi!)
            dynamicDeals.unshift({ title: title, price: price, link: link, img: imgData });
            localStorage.setItem('vortex_deals', JSON.stringify(dynamicDeals));

            renderDeals();
            alert("🚀 Product Box Added Successfully!");
            document.getElementById('adminPanel').style.display = 'none';
            
            // Clear Form inputs
            document.getElementById('pTitle').value = '';
            document.getElementById('pLink').value = '';
            document.getElementById('pPrice').value = '';
            document.getElementById('pImgFile').value = '';
        }

        // Run on Page Load
        renderDeals();
    </script>
</body>
</html>
